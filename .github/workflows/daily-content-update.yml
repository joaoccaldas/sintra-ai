name: Daily News Update

on:
  schedule:
    - cron: '0 8 * * *'    # 08:00 UTC every day
  workflow_dispatch:         # manual trigger from GitHub UI
    inputs:
      ref:
        description: 'Branch to run on (default: main)'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch new AI news (Claude + web search)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-news.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/lib/newsData.ts \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Build (validate TypeScript + generate RSS)
        run: npm run build

      - name: Commit news data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add src/lib/newsData.ts public/feed.xml
          git commit -m "chore: daily news update $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: '41898282+github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: auto news update ${{ github.run_number }}'
