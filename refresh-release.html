<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Activating Sintra AI release</title>
  <style>
    :root{color-scheme:dark;background:#090b14;color:#f6f3ff;font-family:system-ui,sans-serif}
    body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px}
    main{max-width:520px;text-align:center}h1{font-weight:500}p{color:#b9b5c9;line-height:1.6}
    .bar{height:4px;background:#24263b;border-radius:99px;overflow:hidden;margin:24px 0}
    .bar span{display:block;height:100%;width:40%;background:#9f8cff;animation:move 1s linear infinite}
    @keyframes move{from{transform:translateX(-120%)}to{transform:translateX(360%)}}
  </style>
</head>
<body>
  <main>
    <h1>Updating Sintra AI</h1>
    <p id="status">Clearing the previous cache and activating the existing news page with the latest records.</p>
    <div class="bar" aria-hidden="true"><span></span></div>
  </main>
  <script>
    (async function () {
      const target = '/sintra-ai/news/?release=news-20260623';
      const status = document.getElementById('status');
      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
        if ('serviceWorker' in navigator) {
          const registration = await navigator.serviceWorker.register('/sintra-ai/sw.js?v=news-20260623', {
            scope: '/sintra-ai/',
            updateViaCache: 'none'
          });
          await registration.update();
        }
        status.textContent = 'Release activated. Opening the existing AI news page…';
      } catch (error) {
        status.textContent = 'Cache cleared. Opening the existing AI news page…';
      }
      window.setTimeout(function () { window.location.replace(target); }, 600);
    })();
  </script>
</body>
</html>
