<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Sintra Tesseract</title>
  <style>
    html, body { margin: 0; height: 100%; background: #090B14; color: #F4F2EA;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .wrap { min-height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .mark { width: 48px; height: 48px; margin-bottom: 28px; }
    .eyebrow { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
      letter-spacing: 0.2em; text-transform: uppercase; color: #B6A6FF; margin: 0 0 18px; }
    h1 { font-family: Georgia, "Times New Roman", serif; font-weight: 300;
      font-size: clamp(28px, 6vw, 44px); line-height: 1.1; margin: 0 0 16px; max-width: 18ch; }
    p { color: #9a99b5; font-size: 15px; line-height: 1.6; max-width: 36ch; margin: 0 0 28px; }
    button { font-family: ui-monospace, monospace; font-size: 12px; letter-spacing: 0.05em;
      color: #B6A6FF; background: rgba(159,140,255,0.08); border: 1px solid rgba(159,140,255,0.35);
      padding: 10px 20px; border-radius: 999px; cursor: pointer; }
    button:hover { background: rgba(159,140,255,0.16); }
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="mark" viewBox="0 0 100 100" fill="none" stroke="#B6A6FF" stroke-width="3">
      <rect x="20" y="20" width="45" height="45" /><rect x="35" y="35" width="45" height="45" />
      <line x1="20" y1="20" x2="35" y2="35" /><line x1="65" y1="20" x2="80" y2="35" />
      <line x1="20" y1="65" x2="35" y2="80" /><line x1="65" y1="65" x2="80" y2="80" />
    </svg>
    <p class="eyebrow">Offline</p>
    <h1>You're offline right now.</h1>
    <p>Pages you've already visited are still available from the cache. Reconnect to load fresh AI news.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
